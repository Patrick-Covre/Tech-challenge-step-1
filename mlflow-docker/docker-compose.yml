version: '3.8'

services:
  # ==================== BANCO DE DADOS ====================
  postgres:
    image: postgres:15-alpine
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow123
      POSTGRES_DB: mlflowdb
    volumes:
      # Persistência padrão (volume nomeado, dentro do WSL)
      - postgres_data:/var/lib/postgresql/data
      # Se quiser salvar diretamente no Windows (descomente e comente a linha acima):
      # - /mnt/c/Users/SeuUsuario/mlflow-data/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - ml-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflowdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ARMAZENAMENTO DE ARTEFATOS (S3) ====================
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
      # Alternativa Windows: /mnt/c/Users/SeuUsuario/mlflow-data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ml-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== MLFLOW TRACKING SERVER ====================
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    environment:
    - AWS_ACCESS_KEY_ID=minioadmin
    - AWS_SECRET_ACCESS_KEY=minioadmin123
    - AWS_DEFAULT_REGION=us-east-1
    - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    - MLFLOW_ARTIFACT_URI=s3://mlflow-artifacts/

    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ml-net
    restart: unless-stopped
    entrypoint: |
      sh -c "
      apt-get update && apt-get install -y curl &&
      curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc &&
      chmod +x /usr/local/bin/mc &&
      while ! mc alias set myminio http://minio:9000 minioadmin minioadmin123; do sleep 1; done &&
      mc mb myminio/mlflow-artifacts --ignore-existing &&
      exec mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts '*' --disable-security-middleware \
        --backend-store-uri postgresql://mlflow:mlflow123@postgres:5432/mlflowdb \
        --default-artifact-root s3://mlflow-artifacts/ \
        --artifacts-destination s3://mlflow-artifacts/
      "

  # ==================== JUPYTERLAB PARA EXPERIMENTAÇÃO ====================
  jupyter:
    build:
        context: ./jupyter        # caminho onde está o Dockerfile e requirements.txt
        dockerfile: Dockerfile
    container_name: mlflow-miniconda
    environment:
        - MLFLOW_TRACKING_URI=http://mlflow:5000
        - AWS_ACCESS_KEY_ID=minioadmin
        - AWS_SECRET_ACCESS_KEY=minioadmin123
        - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
        - MLFLOW_ARTIFACT_URI=s3://mlflow-artifacts/
    volumes:
        # Monta as pastas do seu projeto (que estão em ../src/)
        - ../:/home/jarvis/
    ports:
        - "8888:8888"
    depends_on:
        - mlflow
    networks:
        - ml-net
    restart: unless-stopped

  # ==================== FASTAPI (SERVE MODELOS) ====================
  fastapi:
    build: ./fastapi-app
    container_name: mlflow-fastapi
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    networks:
      - ml-net
    restart: unless-stopped
    volumes:
      # Monta toda a pasta src (código da aplicação) dentro do container
      - ../src:/app/src
    working_dir: /app/src
    # Supondo que o ponto de entrada seja um arquivo main.py na raiz de src/
    # Se seu main.py estiver dentro de service/, ajuste para "service.main:app"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

# ==================== VOLUMES (PERSISTÊNCIA) ====================
volumes:
  postgres_data:
    name: mlflow_postgres_data
  minio_data:
    name: mlflow_minio_data

# ==================== REDE INTERNA ====================
networks:
  ml-net:
    name: mlflow-network
